{
  "suite": "longmemeval",
  "display_name": "LongMemEval",
  "upstream_repo": "https://github.com/xiaowu0162/LongMemEval.git",
  "vendor_dir": "vendor/longmemeval",
  "data_dir": "data/longmemeval",
  "defaults": {
    "dataset_split": "oracle",
    "supported_splits": ["oracle", "s", "m"]
  },
  "downloads": [
    {
      "name": "oracle",
      "relative_path": "longmemeval_oracle.json",
      "url": "https://huggingface.co/datasets/xiaowu0162/longmemeval-cleaned/resolve/main/longmemeval_oracle.json",
      "default": true
    },
    {
      "name": "s",
      "relative_path": "longmemeval_s_cleaned.json",
      "url": "https://huggingface.co/datasets/xiaowu0162/longmemeval-cleaned/resolve/main/longmemeval_s_cleaned.json",
      "default": true
    },
    {
      "name": "m",
      "relative_path": "longmemeval_m_cleaned.json",
      "url": "https://huggingface.co/datasets/xiaowu0162/longmemeval-cleaned/resolve/main/longmemeval_m_cleaned.json",
      "default": false
    }
  ],
  "manual_files": [],
  "official_eval": {
    "kind": "python_script",
    "relative_path": "src/evaluation/evaluate_qa.py",
    "notes": "Requires upstream dependencies and OPENAI_API_KEY for model-based judging."
  },
  "notes": [
    "Default runs use oracle because it is the smallest turnkey split.",
    "S is supported for larger but still practical evaluation.",
    "M is optional and not fetched by default."
  ]
}
