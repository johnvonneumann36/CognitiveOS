name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
        run: |
          retry() {
            local attempt=1
            local max_attempts=5
            until "$@"; do
              local status=$?
              if [ "$attempt" -ge "$max_attempts" ]; then
                return "$status"
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          }

          release_exists() {
            local attempt=1
            local max_attempts=5
            local output
            while true; do
              if output="$(gh release view "$TAG_NAME" 2>&1)"; then
                return 0
              fi
              if grep -q "release not found" <<<"$output"; then
                return 1
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "$output" >&2
                return 2
              fi
              sleep "$((attempt * 10))"
              attempt="$((attempt + 1))"
            done
          }

          if release_exists; then
            retry gh release upload "$TAG_NAME" dist/* --clobber
            retry gh release edit "$TAG_NAME" \
              --draft=false \
              --prerelease=false \
              --latest
          else
            retry gh release create "$TAG_NAME" dist/* \
              --verify-tag \
              --generate-notes \
              --draft=false \
              --prerelease=false \
              --latest
          fi
