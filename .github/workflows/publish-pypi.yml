name: Publish PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.3"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve release version
        id: meta
        shell: bash
        run: |
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      PYPI_USERNAME: ${{ secrets.PYPI_USERNAME }}
      PYPI_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Check whether version already exists on PyPI
        id: pypi_check
        run: |
          python - <<'PY'
          import os
          import time
          import urllib.error
          import urllib.request

          version = "${{ needs.build.outputs.version }}"
          url = f"https://pypi.org/pypi/cognitiveos/{version}/json"
          exists = "false"
          for attempt in range(1, 6):
              try:
                  with urllib.request.urlopen(url, timeout=15) as response:
                      exists = "true" if response.status == 200 else "false"
                      break
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      exists = "false"
                      break
                  if 500 <= exc.code < 600 and attempt < 5:
                      time.sleep(attempt * 10)
                      continue
                  raise
              except urllib.error.URLError:
                  if attempt >= 5:
                      raise
                  time.sleep(attempt * 10)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"exists={exists}\n")
          PY

      - name: Skip publish because version already exists
        if: steps.pypi_check.outputs.exists == 'true'
        run: echo "cognitiveos==${{ needs.build.outputs.version }} already exists on PyPI; skipping publish."

      - name: Publish to PyPI with API token
        if: steps.pypi_check.outputs.exists != 'true' && env.PYPI_API_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Publish to PyPI with username and password
        if: steps.pypi_check.outputs.exists != 'true' && env.PYPI_API_TOKEN == '' && env.PYPI_USERNAME != '' && env.PYPI_PASSWORD != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: ${{ secrets.PYPI_USERNAME }}
          password: ${{ secrets.PYPI_PASSWORD }}
          skip-existing: true

      - name: Publish to PyPI with trusted publishing
        if: steps.pypi_check.outputs.exists != 'true' && env.PYPI_API_TOKEN == '' && (env.PYPI_USERNAME == '' || env.PYPI_PASSWORD == '')
        uses: pypa/gh-action-pypi-publish@release/v1
